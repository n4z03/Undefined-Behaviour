# Nginx config for the McGill class server.
#
# This proxies EVERYTHING to the Express app (port 3000).
# Express serves the React build for all non-API routes and handles the
# SPA fallback itself, so refreshing on /user-dashboard works correctly.
#
# Place this file at:  /etc/nginx/sites-available/comp307-group39
# Enable with:         sudo ln -s /etc/nginx/sites-available/comp307-group39 /etc/nginx/sites-enabled/
# Reload with:         sudo nginx -s reload

server {
    listen 80;
    server_name winter2026-comp307-group39.cs.mcgill.ca;

    # Forward all traffic to the Express app.
    # Express serves /api/* as API and everything else as the React SPA.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for express-session cookies to work behind a proxy
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep connections alive
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
